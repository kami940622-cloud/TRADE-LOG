<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TRADE LOG">
<title>TRADE LOG</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0a0a0a;
  --surface: #111;
  --panel:   #161616;
  --panel2:  #1c1c1c;
  --border:  #2a2a2a;
  --border2: #333;
  --orange:  #ff9500;
  --orange2: #ffb340;
  --orange-d:rgba(255,149,0,0.13);
  --green:   #30d158;
  --green-d: rgba(48,209,88,0.12);
  --red:     #ff453a;
  --red-d:   rgba(255,69,58,0.12);
  --blue:    #0a84ff;
  --blue-d:  rgba(10,132,255,0.12);
  --gray-d:  rgba(150,150,150,0.1);
  --text:    #ebebeb;
  --text-2:  #999;
  --text-3:  #555;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'IBM Plex Sans KR', sans-serif;
  --radius:  10px;
  --touch:   52px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  padding-bottom: 90px;
  overscroll-behavior: none;
}

/* ── HEADER ── */
.header {
  background: var(--orange);
  padding: 0 20px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-logo {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 1.05em;
  color: #000;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-sq {
  width: 20px; height: 20px;
  background: #000;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.logo-sq::after {
  content: '';
  width: 9px; height: 9px;
  background: var(--orange);
}

.header-stats {
  display: flex;
  gap: 16px;
  align-items: center;
}

.hstat {
  text-align: right;
}

.hstat-label {
  font-family: var(--mono);
  font-size: 0.52em;
  color: rgba(0,0,0,0.5);
  letter-spacing: 1px;
  text-transform: uppercase;
  line-height: 1;
}

.hstat-value {
  font-family: var(--mono);
  font-size: 0.9em;
  font-weight: 700;
  color: #000;
  line-height: 1.3;
}

.hstat-value.pos { color: #004d18; }
.hstat-value.neg { color: #7a0000; }

/* ── BOTTOM NAV (아이패드용) ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 82px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  background: none;
  border: none;
  color: var(--text-3);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 0.58em;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: color 0.15s;
  padding: 8px 0;
  position: relative;
}

.nav-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--orange);
  transform: scaleX(0);
  transition: transform 0.2s;
  border-radius: 0 0 3px 3px;
}

.nav-btn.active { color: var(--orange); }
.nav-btn.active::before { transform: scaleX(1); }

.nav-icon { font-size: 1.6em; line-height: 1; }

/* ── MAIN ── */
.main {
  padding: 16px;
  max-width: 900px;
  margin: 0 auto;
}

.page { display: none; }
.page.active { display: block; animation: fadeUp 0.22s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}

/* ── SECTION TITLE ── */
.sec-title {
  font-family: var(--mono);
  font-size: 0.68em;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--orange);
  padding-left: 10px;
  border-left: 3px solid var(--orange);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ── CARD ── */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 14px;
}

.card-hd {
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-family: var(--mono);
  font-size: 0.65em;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--orange);
  display: flex;
  align-items: center;
  gap: 7px;
}

.card-title::before {
  content: '';
  width: 5px; height: 5px;
  background: var(--orange);
  border-radius: 50%;
}

/* ── FORM ── */
.form-body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-row.single { grid-template-columns: 1fr; }
.form-row.triple { grid-template-columns: 1fr 1fr 1fr; }

.fg {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.fg label {
  font-family: var(--mono);
  font-size: 0.6em;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-3);
}

.fg label.red { color: var(--red); }

.fg input,
.fg select,
.fg textarea {
  background: #0d0d0d;
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 0 14px;
  height: var(--touch);
  font-family: var(--mono);
  font-size: 0.88em;
  outline: none;
  border-radius: 8px;
  transition: border-color 0.15s;
  -webkit-appearance: none;
  width: 100%;
}

.fg input:focus,
.fg select:focus,
.fg textarea:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 2px rgba(255,149,0,0.1);
}

.fg input.sl-inp { border-color: rgba(255,69,58,0.4); }
.fg input.sl-inp:focus { border-color: var(--red); box-shadow: 0 0 0 2px rgba(255,69,58,0.1); }

.fg textarea {
  height: auto;
  min-height: 80px;
  padding: 12px 14px;
  resize: none;
  line-height: 1.5;
}

.fg select option { background: var(--panel2); }

/* ── LONG/SHORT TOGGLE ── */
.ls-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border2);
  height: var(--touch);
}

.ls-btn {
  background: #0d0d0d;
  border: none;
  color: var(--text-3);
  font-family: var(--mono);
  font-size: 0.85em;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  height: 100%;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.ls-btn:first-child { border-right: 1px solid var(--border2); }

.ls-btn.active-long  { background: var(--green-d);  color: var(--green); border-color: var(--green); }
.ls-btn.active-short { background: var(--red-d);    color: var(--red);   border-color: var(--red); }

/* ── WIN/LOSE/DRAW TOGGLE ── */
.wld-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border2);
  height: 44px;
}

.wld-btn {
  background: #0d0d0d;
  border: none;
  color: var(--text-3);
  font-family: var(--mono);
  font-size: 0.72em;
  font-weight: 700;
  letter-spacing: 1.5px;
  cursor: pointer;
  height: 100%;
  transition: all 0.15s;
  border-right: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.wld-btn:last-child { border-right: none; }
.wld-btn.w { }
.wld-btn.w.sel { background: var(--green-d); color: var(--green); }
.wld-btn.d.sel { background: var(--gray-d);  color: var(--text-2); }
.wld-btn.l.sel { background: var(--red-d);   color: var(--red); }

/* ── COIN SELECTOR ── */
.coin-sel { position: relative; }

.coin-trigger {
  background: #0d0d0d;
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 0 14px;
  height: var(--touch);
  font-family: var(--mono);
  font-size: 0.88em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-radius: 8px;
  transition: border-color 0.15s;
}

.coin-trigger.open { border-color: var(--orange); box-shadow: 0 0 0 2px rgba(255,149,0,0.1); }
.coin-trigger.open .ct-arrow { transform: rotate(180deg); }

.ct-left { display: flex; align-items: center; gap: 8px; }
.ct-dot  { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }
.ct-arrow { color: var(--text-3); font-size: 0.75em; transition: transform 0.2s; }

.coin-dd {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--panel2);
  border: 1px solid var(--orange);
  border-radius: 10px;
  z-index: 200;
  box-shadow: 0 12px 40px rgba(0,0,0,0.7);
  overflow: hidden;
}

.coin-dd.open { display: block; }

.coin-scroll {
  max-height: 220px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--orange) transparent;
}

.coin-opt {
  padding: 0 16px;
  height: 48px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 0.9em;
  color: var(--text-2);
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}

.coin-opt:last-child { border-bottom: none; }
.coin-opt:hover, .coin-opt:active { background: var(--orange-d); color: var(--orange); }
.coin-opt.sel { color: var(--orange); background: rgba(255,149,0,0.06); }

.coin-opt-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }

.coin-opt-del {
  margin-left: auto;
  color: var(--text-3);
  font-size: 0.8em;
  padding: 4px 8px;
  border: 1px solid var(--border2);
  border-radius: 6px;
}

.coin-add {
  display: flex;
  border-top: 1px solid var(--border2);
  height: 50px;
}

.coin-add-input {
  flex: 1;
  background: #0d0d0d;
  border: none;
  color: var(--text);
  padding: 0 14px;
  font-family: var(--mono);
  font-size: 0.85em;
  outline: none;
  text-transform: uppercase;
}

.coin-add-input::placeholder { text-transform: none; color: var(--text-3); }

.coin-add-btn {
  background: var(--orange-d);
  border: none;
  border-left: 1px solid var(--border2);
  color: var(--orange);
  padding: 0 18px;
  font-family: var(--mono);
  font-size: 0.8em;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
}

/* ── SCREENSHOT ── */
.ss-zone {
  border: 1.5px dashed var(--border2);
  border-radius: 10px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  background: #0d0d0d;
  position: relative;
  transition: border-color 0.15s;
}

.ss-zone:active { border-color: var(--orange); }
.ss-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.ss-zone-icon { font-size: 1.8em; margin-bottom: 6px; opacity: 0.4; }
.ss-zone-txt { font-family: var(--mono); font-size: 0.65em; letter-spacing: 1px; color: var(--text-3); }

.ss-previews { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

.ss-thumb {
  width: 80px; height: 56px;
  object-fit: cover;
  border: 1px solid var(--border2);
  border-radius: 6px;
  cursor: pointer;
}

/* ── BUTTONS ── */
.btn {
  height: var(--touch);
  padding: 0 24px;
  border: none;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 0.8em;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 700;
  border-radius: 10px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-primary { background: var(--orange); color: #000; }
.btn-primary:active { background: var(--orange2); }

.btn-ghost {
  background: transparent;
  color: var(--text-3);
  border: 1px solid var(--border2);
}

.btn-ghost:active { border-color: var(--orange); color: var(--orange); }

.btn-sm { height: 36px; padding: 0 16px; font-size: 0.68em; border-radius: 8px; }

.form-footer {
  border-top: 1px solid var(--border);
  padding: 14px 16px;
  display: flex;
  gap: 10px;
  background: var(--panel2);
}

.form-footer .btn { flex: 1; }

/* ── TRADE CARDS ── */
.trade-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.15s;
}

.trade-card.editing { border-color: var(--orange); }

.trade-card-hd {
  padding: 13px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  background: var(--panel2);
}

.tc-coin {
  font-family: var(--mono);
  font-size: 1em;
  font-weight: 700;
  color: var(--orange);
  display: flex;
  align-items: center;
  gap: 6px;
}

.tc-coin-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--orange); }

.tc-ls {
  font-family: var(--mono);
  font-size: 0.7em;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 9px;
  border-radius: 5px;
}

.tc-ls.long  { background: var(--green-d); color: var(--green); border: 1px solid rgba(48,209,88,0.25); }
.tc-ls.short { background: var(--red-d);   color: var(--red);   border: 1px solid rgba(255,69,58,0.25); }

.tc-date {
  font-family: var(--mono);
  font-size: 0.7em;
  color: var(--text-3);
  margin-left: auto;
}

.tc-edit-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text-3);
  padding: 5px 12px;
  font-family: var(--mono);
  font-size: 0.65em;
  border-radius: 6px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.12s;
}

.tc-edit-btn:active { border-color: var(--orange); color: var(--orange); }
.tc-edit-btn.del:active { border-color: var(--red); color: var(--red); }

.trade-card-body {
  padding: 14px 16px;
}

/* RESULT BADGE */
.result-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.result-badge {
  font-family: var(--mono);
  font-size: 0.78em;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 5px 14px;
  border-radius: 6px;
}

.result-badge.win  { background: var(--green-d); color: var(--green); border: 1px solid rgba(48,209,88,0.25); }
.result-badge.draw { background: var(--gray-d);  color: var(--text-2); border: 1px solid var(--border2); }
.result-badge.lose { background: var(--red-d);   color: var(--red);   border: 1px solid rgba(255,69,58,0.25); }
.result-badge.none { background: var(--blue-d);  color: var(--blue);  border: 1px solid rgba(10,132,255,0.25); }

/* INFO GRID */
.info-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}

.info-item {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
}

.info-label {
  font-family: var(--mono);
  font-size: 0.55em;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 4px;
}

.info-value {
  font-family: var(--mono);
  font-size: 0.85em;
  font-weight: 600;
  color: var(--text);
}

.info-value.red { color: var(--red); }
.info-value.green { color: var(--green); }

.tc-reason {
  font-size: 0.82em;
  color: var(--text-2);
  line-height: 1.55;
  padding: 10px 12px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
}

.tc-reason-label {
  font-family: var(--mono);
  font-size: 0.6em;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 4px;
}

.tc-imgs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}

/* EDIT FORM inside card */
.edit-form {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  background: rgba(255,149,0,0.03);
  display: none;
  flex-direction: column;
  gap: 10px;
}

.edit-form.open { display: flex; }

.edit-form .form-row { gap: 10px; }

.edit-form .fg input,
.edit-form .fg select,
.edit-form .fg textarea {
  height: 44px;
  font-size: 0.82em;
  border-radius: 7px;
}

.edit-form .fg textarea { height: auto; min-height: 64px; }

.edit-actions {
  display: flex;
  gap: 8px;
}

.edit-actions .btn { height: 42px; font-size: 0.7em; border-radius: 8px; flex: 1; }

/* ── METRICS ── */
.metrics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.metric-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  overflow: hidden;
}

.metric-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--orange);
}

.metric-box.g::before { background: var(--green); }
.metric-box.b::before { background: var(--blue); }

.mb-label {
  font-family: var(--mono);
  font-size: 0.58em;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 8px;
}

.mb-value {
  font-family: var(--mono);
  font-size: 1.5em;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}

.mb-value.pos { color: var(--green); }
.mb-value.neg { color: var(--red); }
.mb-value.ora { color: var(--orange); }
.mb-value.blu { color: var(--blue); }

.mb-sub {
  font-family: var(--mono);
  font-size: 0.6em;
  color: var(--text-3);
  margin-top: 5px;
}

/* ── CHART BARS ── */
.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 0;
}

.bar-sym {
  font-family: var(--mono);
  font-size: 0.72em;
  color: var(--orange);
  width: 48px;
  text-align: right;
  flex-shrink: 0;
  font-weight: 600;
}

.bar-track {
  flex: 1;
  height: 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), rgba(48,209,88,0.4));
  border-radius: 4px;
  transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
}

.bar-fill.neg { background: linear-gradient(90deg, var(--red), rgba(255,69,58,0.4)); }

.bar-val {
  font-family: var(--mono);
  font-size: 0.72em;
  width: 36px;
  flex-shrink: 0;
  text-align: right;
}

/* ── WEEKLY ── */
.week-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
}

.week-hd {
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.week-label {

  font-size: 0.8em;
  font-weight: 700;
  color: var(--orange);
  letter-spacing: 2px;
}

.week-body { padding: 14px 16px; }

.week-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.ws {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
}

.ws-l { font-family: var(--mono); font-size: 0.55em; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-3); margin-bottom: 5px; }
.ws-v { font-family: var(--mono); font-size: 1.1em; font-weight: 700; color: var(--text); }

.insight-box {
  background: var(--panel2);

}

.insight-label { font-family: var(--mono); font-size: 0.6em; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); margin-bottom: 6px; }

/* ── EMPTY ── */
.empty {

}

.empty-ico { font-size: 2.5em; margin-bottom: 12px; opacity: 0.3; }

/* ── MODAL ── */
.modal-ov {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-ov.open { display: flex; }
.modal-ov img { max-width: 94vw; max-height: 86vh; border-radius: 8px; object-fit: contain; }

/* ── FILTER TABS ── */
.filter-tabs {
  display: flex;

.filter-tab {

  border-color: var(--orange);

}

.pos { color: var(--green) !important; }
.neg { color: var(--red) !important; }
</style>

<script>
// ── STATE ──
let trades = JSON.parse(localStorage.getItem('mj_trades') || '[]');
let pendingImgs = [];
let currentFilter = 'all';

const DEFAULT_COINS = ['BTC','ETH','XRP','SOL'];
let coins = JSON.parse(localStorage.getItem('mj_coins') || JSON.stringify(DEFAULT_COINS));
let selCoin = coins[0];

// ── PERSIST ──
function save() {
  localStorage.setItem('mj_trades', JSON.stringify(trades));
  updateHeader();
}

function saveCoins() {
  localStorage.setItem('mj_coins', JSON.stringify(coins));
}

// ── HEADER ──
function updateHeader() {
  const done = trades.filter(t => t.result !== 'ACTIVE');
  const wins = done.filter(t => t.result === 'WIN').length;
  const wr   = done.length ? (wins / done.length * 100).toFixed(0) : null;
  document.getElementById('hTotal').textContent = trades.length;
  document.getElementById('hWr').textContent = wr ? wr + '%' : '—';
}

// ── PAGE NAV ──
function goPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'history') renderHistory();
  if (id === 'dash')    renderDash();
  if (id === 'weekly')  renderWeekly();
}

// ── LONG/SHORT ──
let lsVal = 'LONG';
function setLS(v) {
  lsVal = v;
  document.getElementById('lsLong').className  = 'ls-btn' + (v==='LONG'  ? ' active-long'  : '');
  document.getElementById('lsShort').className = 'ls-btn' + (v==='SHORT' ? ' active-short' : '');
}

// ── COIN SELECTOR ──
function renderCoins() {
  document.getElementById('coinList').innerHTML = coins.map(c => `
    <div class="coin-opt ${c===selCoin?'sel':''}" onclick="pickCoin('${c}')">
      <span class="coin-opt-dot"></span>
      <span style="flex:1">${c}</span>
      ${!DEFAULT_COINS.includes(c) ? `<span class="coin-opt-del" onclick="delCoin(event,'${c}')">✕</span>` : ''}
    </div>`).join('');
}

function toggleCoinDD() {
  const dd = document.getElementById('coinDD');
  const tr = document.getElementById('coinTrigger');
  const open = dd.classList.toggle('open');
  tr.classList.toggle('open', open);
  if (open) renderCoins();
}

function pickCoin(c) {
  selCoin = c;
  document.getElementById('coinLabel').textContent = c;
  document.getElementById('coinDD').classList.remove('open');
  document.getElementById('coinTrigger').classList.remove('open');
}

function addCoin() {
  const inp = document.getElementById('coinAddInput');
  const v = inp.value.trim().toUpperCase();
  if (!v || coins.includes(v)) { inp.value = ''; return; }
  coins.push(v); saveCoins(); inp.value = '';
  renderCoins(); pickCoin(v);
}

function delCoin(e, c) {
  e.stopPropagation();
  coins = coins.filter(x => x !== c); saveCoins();
  if (selCoin === c) pickCoin(coins[0] || 'BTC');
  renderCoins();
}

document.addEventListener('click', e => {
  const sel = document.getElementById('coinSel');
  if (sel && !sel.contains(e.target)) {
    document.getElementById('coinDD').classList.remove('open');
    document.getElementById('coinTrigger').classList.remove('open');
  }
});

// ── SCREENSHOT ──
function handleFiles(files) {
  for (const f of files) {
    const r = new FileReader();
    r.onload = e => { pendingImgs.push(e.target.result); renderPreviews(); };
    r.readAsDataURL(f);
  }
}

function renderPreviews() {
  document.getElementById('ssPreview').innerHTML =
    pendingImgs.map(s => `<img class="ss-thumb" src="${s}" onclick="openImg('${s}')">`).join('');
}

// ── CLEAR FORM ──
function clearForm() {
  ['fEntry','fAmount','fSL','fExit','fEntryDate','fExitDate','fEntryReason','fExitReason','fMemo']
    .forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  setNow('fEntryDate');
  pendingImgs = [];
  document.getElementById('ssPreview').innerHTML = '';
  setLS('LONG');
}

// ── SAVE TRADE ──
function saveTrade() {
  const coin   = selCoin;
  const entry  = parseFloat(document.getElementById('fEntry').value);
  const amount = parseFloat(document.getElementById('fAmount').value);
  const eDate  = document.getElementById('fEntryDate').value;
  const sl     = parseFloat(document.getElementById('fSL').value) || null;
  const exit   = parseFloat(document.getElementById('fExit').value) || null;
  const xDate  = document.getElementById('fExitDate').value || null;
  const eReas  = document.getElementById('fEntryReason').value;
  const xReas  = document.getElementById('fExitReason').value;
  const memo   = document.getElementById('fMemo').value;
  const market = document.getElementById('fMarket').value;

  if (!coin || !entry || !amount || !eDate) {
    alert('코인, 매수가, 수량, 매수일은 필수입니다.'); return;
  }

  const slGap = (sl && entry) ? (sl - entry) / entry * 100 : null;

  trades.unshift({
    id: 'T' + Date.now(),
    coin, ls: lsVal, entry, amount, eDate, sl, slGap,
    exit, xDate, eReas, xReas, memo, market,
    result: 'ACTIVE',
    imgs: [...pendingImgs]
  });

  save(); clearForm();
  alert('저장되었습니다!');
}

// ── FILTER ──
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}

// ── RENDER HISTORY ──
function renderHistory() {
  let list = trades;
  if (currentFilter !== 'all') {
    list = trades.filter(t => t.result === currentFilter);
  }

  const container = document.getElementById('tradeList');
  const empty     = document.getElementById('tradeEmpty');

  if (!list.length) {
    container.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  container.innerHTML = list.map(t => {
    const resultBadge = {
      'WIN':    `<span class="result-badge win">✅ WIN</span>`,
      'DRAW':   `<span class="result-badge draw">➖ DRAW</span>`,
      'LOSE':   `<span class="result-badge lose">❌ LOSE</span>`,
      'ACTIVE': `<span class="result-badge none">🔄 진행중</span>`
    }[t.result] || '';

    const slTxt = t.sl
      ? `${t.sl.toLocaleString()}${t.slGap !== null ? ` (${t.slGap.toFixed(1)}%)` : ''}`
      : '—';

    const pnl    = (t.exit && t.entry && t.amount) ? (t.exit - t.entry) * t.amount : null;
    const roi    = (t.exit && t.entry) ? (t.exit - t.entry) / t.entry * 100 : null;
    const pnlTxt = pnl !== null ? `${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}` : '—';
    const roiTxt = roi !== null ? `${roi >= 0 ? '+' : ''}${roi.toFixed(2)}%` : '—';
    const pnlCls = pnl !== null ? (pnl >= 0 ? 'green' : 'red') : '';

    const imgHtml = t.imgs && t.imgs.length
      ? `<div class="tc-imgs">${t.imgs.map(s => `<img class="ss-thumb" src="${s}" onclick="openImg('${s}')">`).join('')}</div>`
      : '';

    const reasonHtml = (t.eReas || t.xReas || t.memo) ? `
      ${t.eReas ? `<div class="tc-reason"><div class="tc-reason-label">진입 근거</div>${t.eReas}</div>` : ''}
      ${t.xReas ? `<div class="tc-reason"><div class="tc-reason-label">청산 근거</div>${t.xReas}</div>` : ''}
      ${t.memo  ? `<div class="tc-reason"><div class="tc-reason-label">비고</div>${t.memo}</div>` : ''}
    ` : '';

    return `
    <div class="trade-card" id="card-${t.id}">
      <div class="trade-card-hd">
        <span class="tc-coin"><span class="tc-coin-dot"></span>${t.coin}</span>
        <span class="tc-ls ${(t.ls||'LONG').toLowerCase()}">${t.ls||'LONG'}</span>
        <span class="tc-date">${t.eDate || ''}</span>
        <button class="tc-edit-btn" onclick="toggleEdit('${t.id}')">수정</button>
        <button class="tc-edit-btn del" onclick="delTrade('${t.id}')">삭제</button>
      </div>
      <div class="trade-card-body">
        <div class="result-row">
          ${resultBadge}
          <span style="font-family:var(--mono);font-size:0.72em;color:var(--text-3)">${t.market||''}</span>
        </div>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">매수가</div>
            <div class="info-value">${t.entry ? t.entry.toLocaleString() : '—'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">손절가</div>
            <div class="info-value red">${slTxt}</div>
          </div>
          <div class="info-item">
            <div class="info-label">청산가</div>
            <div class="info-value ${t.exit ? 'green' : ''}">${t.exit ? t.exit.toLocaleString() : '—'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">수량</div>
            <div class="info-value">${t.amount || '—'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">매수일</div>
            <div class="info-value" style="font-size:0.78em">${t.eDate || '—'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">청산일</div>
            <div class="info-value" style="font-size:0.78em">${t.xDate || '—'}</div>
          </div>
          <div class="info-item" style="border-top:1px solid var(--border)">
            <div class="info-label">P&L</div>
            <div class="info-value ${pnlCls}">${pnlTxt}</div>
          </div>
          <div class="info-item" style="border-top:1px solid var(--border)">
            <div class="info-label">ROI</div>
            <div class="info-value ${pnlCls}">${roiTxt}</div>
          </div>
          <div class="info-item" style="border-top:1px solid var(--border)">
            <div class="info-label">수량</div>
            <div class="info-value">${t.amount || '—'}</div>
          </div>
        </div>
        ${reasonHtml}
        ${imgHtml}
      </div>

      <!-- 수정 폼 -->
      <div class="edit-form" id="edit-${t.id}">
        <div style="font-family:var(--mono);font-size:0.65em;letter-spacing:2px;color:var(--orange);margin-bottom:4px">▶ 결과 선택</div>
        <div class="wld-toggle">
          <button class="wld-btn w ${t.result==='WIN'?'sel':''}"  onclick="setResult('${t.id}','WIN')">✅ WIN</button>
          <button class="wld-btn d ${t.result==='DRAW'?'sel':''}" onclick="setResult('${t.id}','DRAW')">➖ DRAW</button>
          <button class="wld-btn l ${t.result==='LOSE'?'sel':''}" onclick="setResult('${t.id}','LOSE')">❌ LOSE</button>
        </div>
        <div class="form-row">
          <div class="fg"><label>청산가</label><input type="number" id="e_exit_${t.id}" value="${t.exit||''}" placeholder="0.00" inputmode="decimal"></div>
          <div class="fg">
            <label>청산일시</label>
            <div style="display:flex;gap:5px;align-items:center">
              <input type="datetime-local" id="e_xDate_${t.id}" value="${t.xDate||''}" style="flex:1;height:44px;font-size:0.78em;border-radius:7px">
              <button type="button" onclick="setNow('e_xDate_${t.id}')" style="height:44px;padding:0 8px;background:var(--orange-d);border:1px solid rgba(255,149,0,.3);color:var(--orange);font-family:var(--mono);font-size:0.6em;border-radius:7px;cursor:pointer;letter-spacing:1px">NOW</button>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="fg"><label>손절가</label><input type="number" id="e_sl_${t.id}" value="${t.sl||''}" placeholder="0.00" inputmode="decimal" class="sl-inp"></div>
          <div class="fg">
            <label>장세</label>
            <select id="e_market_${t.id}">
              <option ${t.market==='상승장'?'selected':''}>상승장</option>
              <option ${t.market==='하락장'?'selected':''}>하락장</option>
              <option ${t.market==='박스권'?'selected':''}>박스권</option>
            </select>
          </div>
        </div>
        <div class="fg"><label>진입 근거</label><textarea id="e_eReas_${t.id}" placeholder="진입 근거">${t.eReas||''}</textarea></div>
        <div class="fg"><label>청산 근거</label><textarea id="e_xReas_${t.id}" placeholder="청산 근거">${t.xReas||''}</textarea></div>
        <div class="fg"><label>비고</label><textarea id="e_memo_${t.id}" placeholder="비고">${t.memo||''}</textarea></div>
        <div class="edit-actions">
          <button class="btn btn-ghost" onclick="toggleEdit('${t.id}')">취소</button>
          <button class="btn btn-primary" onclick="applyEdit('${t.id}')">저장</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleEdit(id) {
  const card = document.getElementById('card-' + id);
  const form = document.getElementById('edit-' + id);
  const open = form.classList.toggle('open');
  card.classList.toggle('editing', open);
}

function setResult(id, result) {
  // 버튼 UI 업데이트
  const form = document.getElementById('edit-' + id);
  form.querySelectorAll('.wld-btn').forEach(b => b.classList.remove('sel'));
  const map = {'WIN':'w','DRAW':'d','LOSE':'l'};
  form.querySelector('.' + map[result])?.classList.add('sel');
  // 임시 저장 (applyEdit 시 반영)
  form.dataset.result = result;
}

function applyEdit(id) {
  const t = trades.find(x => x.id === id);
  if (!t) return;
  const form = document.getElementById('edit-' + id);

  const newExit   = parseFloat(document.getElementById('e_exit_' + id).value) || null;
  const newXDate  = document.getElementById('e_xDate_' + id).value || null;
  const newSL     = parseFloat(document.getElementById('e_sl_' + id).value) || null;
  const newMarket = document.getElementById('e_market_' + id).value;
  const newEReas  = document.getElementById('e_eReas_' + id).value;
  const newXReas  = document.getElementById('e_xReas_' + id).value;
  const newMemo   = document.getElementById('e_memo_' + id).value;
  const newResult = form.dataset.result || t.result;

  t.exit   = newExit;
  t.xDate  = newXDate;
  t.sl     = newSL;
  t.slGap  = (newSL && t.entry) ? (newSL - t.entry) / t.entry * 100 : null;
  t.market = newMarket;
  t.eReas  = newEReas;
  t.xReas  = newXReas;
  t.memo   = newMemo;
  t.result = newResult;

  save();
  renderHistory();
}

function delTrade(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  trades = trades.filter(x => x.id !== id);
  save(); renderHistory();
}

// ── DASHBOARD ──
let dashCoin = 'all';

function setDashCoin(c, btn) {
  dashCoin = c;
  document.querySelectorAll('#dashCoinTabs .filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCoinChart();
}

function renderCoinChart() {
  const done = trades.filter(t => t.result !== 'ACTIVE');

  if (dashCoin === 'all') {
    // 전체: 코인별 WIN RATE 바 차트
    const byCoin = {};
    done.forEach(t => {
      if (!byCoin[t.coin]) byCoin[t.coin] = { w:0, n:0, d:0, l:0 };
      byCoin[t.coin].n++;
      if (t.result === 'WIN')  byCoin[t.coin].w++;
      if (t.result === 'DRAW') byCoin[t.coin].d++;
      if (t.result === 'LOSE') byCoin[t.coin].l++;
    });
    const coinEntries = Object.entries(byCoin).sort((a,b) => b[1].w/b[1].n - a[1].w/a[1].n);
    document.getElementById('coinChart').innerHTML = coinEntries.length
      ? coinEntries.map(([c, v]) => {
          const wr2 = v.w / v.n * 100;
          return `<div class="bar-row">
            <div class="bar-sym">${c}</div>
            <div class="bar-track"><div class="bar-fill ${wr2 < 40 ? 'neg' : ''}" style="width:${wr2}%"></div></div>
            <div class="bar-val ${wr2>=50?'pos':'neg'}">${wr2.toFixed(0)}%</div>
          </div>
          <div style="font-family:var(--mono);font-size:0.6em;color:var(--text-3);padding:0 0 8px 58px">${v.w}W / ${v.d}D / ${v.l}L · ${v.n}거래</div>`;
        }).join('')
      : '<div class="empty" style="padding:20px"><div class="empty-ico" style="font-size:1.8em">📊</div><div class="empty-txt">데이터 없음</div></div>';
  } else {
    // 특정 코인: 해당 코인 상세 통계
    const coinTrades = done.filter(t => t.coin === dashCoin);
    if (!coinTrades.length) {
      document.getElementById('coinChart').innerHTML =
        '<div class="empty" style="padding:20px"><div class="empty-ico" style="font-size:1.8em">📊</div><div class="empty-txt">해당 코인 데이터 없음</div></div>';
      return;
    }
    const wins  = coinTrades.filter(t => t.result === 'WIN').length;
    const loses = coinTrades.filter(t => t.result === 'LOSE').length;
    const draws = coinTrades.filter(t => t.result === 'DRAW').length;
    const wr2   = (wins / coinTrades.length * 100).toFixed(0);

    // 장세별 성과
    const byMkt2 = {};
    coinTrades.forEach(t => {
      if (!t.market) return;
      if (!byMkt2[t.market]) byMkt2[t.market] = { w:0, n:0 };
      byMkt2[t.market].n++;
      if (t.result === 'WIN') byMkt2[t.market].w++;
    });

    // LONG/SHORT 성과
    const byLS = {};
    coinTrades.forEach(t => {
      const k = t.ls || 'LONG';
      if (!byLS[k]) byLS[k] = { w:0, n:0 };
      byLS[k].n++;
      if (t.result === 'WIN') byLS[k].w++;
    });

    document.getElementById('coinChart').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
        <div class="info-item"><div class="info-label">총 거래</div><div class="info-value">${coinTrades.length}</div></div>
        <div class="info-item"><div class="info-label">WIN RATE</div><div class="info-value ${parseInt(wr2)>=50?'green':'red'}">${wr2}%</div></div>
        <div class="info-item"><div class="info-label">W/D/L</div><div class="info-value">${wins}/${draws}/${loses}</div></div>
      </div>
      <div style="font-family:var(--mono);font-size:0.62em;letter-spacing:2px;color:var(--orange);margin-bottom:8px">장세별 승률</div>
      ${Object.entries(byMkt2).map(([m, v]) => {
        const wr3 = v.w / v.n * 100;
        return `<div class="bar-row">
          <div class="bar-sym" style="width:60px;font-size:0.65em">${m}</div>
          <div class="bar-track"><div class="bar-fill ${wr3<40?'neg':''}" style="width:${wr3}%"></div></div>
          <div class="bar-val ${wr3>=50?'pos':'neg'}">${wr3.toFixed(0)}%</div>
        </div>`;
      }).join('') || '<div style="color:var(--text-3);font-size:0.8em;padding:4px 0">데이터 없음</div>'}
      <div style="font-family:var(--mono);font-size:0.62em;letter-spacing:2px;color:var(--orange);margin:12px 0 8px">LONG / SHORT 승률</div>
      ${Object.entries(byLS).map(([ls, v]) => {
        const wr3 = v.w / v.n * 100;
        return `<div class="bar-row">
          <div class="bar-sym" style="width:60px;font-size:0.65em;color:${ls==='LONG'?'var(--green)':'var(--red)'}">${ls}</div>
          <div class="bar-track"><div class="bar-fill ${wr3<40?'neg':''}" style="width:${wr3}%"></div></div>
          <div class="bar-val ${wr3>=50?'pos':'neg'}">${wr3.toFixed(0)}%</div>
        </div>`;
      }).join('') || '<div style="color:var(--text-3);font-size:0.8em;padding:4px 0">데이터 없음</div>'}
    `;
  }
}

function renderDash() {
  const done  = trades.filter(t => t.result !== 'ACTIVE');
  const wins  = done.filter(t => t.result === 'WIN').length;
  const loses = done.filter(t => t.result === 'LOSE').length;
  const draws = done.filter(t => t.result === 'DRAW').length;
  const wr    = done.length ? (wins / done.length * 100).toFixed(0) : null;
  const act   = trades.filter(t => t.result === 'ACTIVE').length;

  document.getElementById('dTotal').textContent     = trades.length;
  document.getElementById('dActiveSub').textContent = `진행중 ${act}`;
  document.getElementById('dWr').textContent        = wr ? wr + '%' : '— %';
  document.getElementById('dWrSub').textContent     = `${wins}W / ${loses}L / ${draws}D`;
  document.getElementById('dWin').textContent       = wins;
  document.getElementById('dLose').textContent      = loses;

  // 코인 탭 버튼 동적 생성
  const tradedCoins = [...new Set(done.map(t => t.coin))];
  const tabsEl = document.getElementById('dashCoinTabs');
  tabsEl.innerHTML = `<button class="filter-tab ${dashCoin==='all'?'active':''}" onclick="setDashCoin('all',this)">전체</button>`
    + tradedCoins.map(c =>
        `<button class="filter-tab ${dashCoin===c?'active':''}" onclick="setDashCoin('${c}',this)">${c}</button>`
      ).join('');

  renderCoinChart();
}

// ── WEEKLY ──
function getWeek(ds) {
  if (!ds) return '알 수 없음';
  const d = new Date(ds);
  const j = new Date(d.getFullYear(), 0, 1);
  const w = Math.ceil(((d - j) / 86400000 + j.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(w).padStart(2, '0')}`;
}

function renderWeekly() {
  const byW = {};
  trades.forEach(t => {
    const w = getWeek(t.xDate || t.eDate);
    if (!byW[w]) byW[w] = [];
    byW[w].push(t);
  });
  const weeks = Object.keys(byW).sort().reverse();
  const el = document.getElementById('weeklyWrap');

  if (!weeks.length) {
    el.innerHTML = `<div class="empty"><div class="empty-ico">📅</div><div class="empty-txt">거래를 기록하면 주간 분석이 생성됩니다</div></div>`;
    return;
  }

  el.innerHTML = weeks.map(w => {
    const list  = byW[w];
    const done  = list.filter(t => t.result !== 'ACTIVE');
    const wins  = done.filter(t => t.result === 'WIN').length;
    const loses = done.filter(t => t.result === 'LOSE').length;
    const draws = done.filter(t => t.result === 'DRAW').length;
    const wr    = done.length ? (wins / done.length * 100).toFixed(0) : '—';

    const coinSet = [...new Set(list.map(t => t.coin))].join(', ');

    return `<div class="week-card">
      <div class="week-hd">
        <span class="week-label">◼ ${w}</span>
        <span style="font-family:var(--mono);font-size:0.78em;color:var(--text-2)">${list.length}거래</span>
      </div>
      <div class="week-body">
        <div class="week-stats">
          <div class="ws"><div class="ws-l">WIN RATE</div><div class="ws-v ${parseInt(wr)>=50?'pos':'neg'}">${wr}%</div></div>
          <div class="ws"><div class="ws-l">W/D/L</div><div class="ws-v">${wins}/${draws}/${loses}</div></div>
          <div class="ws"><div class="ws-l">총 거래</div><div class="ws-v">${list.length}</div></div>
        </div>
        <div class="insight-box">
          <div class="insight-label">거래 코인</div>
          <div class="insight-txt">${coinSet || '—'}</div>
        </div>
        ${wins > 0 ? `<div class="insight-box">
          <div class="insight-label">✅ BEST WIN</div>
          <div class="insight-txt">${(() => { const b = list.filter(t=>t.result==='WIN')[0]; return b ? `${b.coin} | ${b.eDate} → ${b.xDate||'?'}<br><span style="color:var(--text-3)">${b.eReas||'—'}</span>` : '—'; })()}</div>
        </div>` : ''}
        ${loses > 0 ? `<div class="insight-box">
          <div class="insight-label">❌ WORST LOSE</div>
          <div class="insight-txt">${(() => { const b = list.filter(t=>t.result==='LOSE')[0]; return b ? `${b.coin} | ${b.eDate} → ${b.xDate||'?'}<br><span style="color:var(--text-3)">${b.eReas||'—'}</span>` : '—'; })()}</div>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── IMG MODAL ──
function openImg(src) {
  document.getElementById('imgModalSrc').src = src;
  document.getElementById('imgModal').classList.add('open');
}

// ── DRAG & DROP ──
const ssZone = document.getElementById('ssZone');
ssZone.addEventListener('dragover', e => { e.preventDefault(); ssZone.style.borderColor = 'var(--orange)'; });
ssZone.addEventListener('dragleave', () => { ssZone.style.borderColor = ''; });
ssZone.addEventListener('drop', e => {
  e.preventDefault(); ssZone.style.borderColor = '';
  handleFiles(e.dataTransfer.files);
});

// ── NOW 버튼: 현재 날짜+시간을 datetime-local 형식으로 입력 ──
function setNow(fieldId) {
  const el = document.getElementById(fieldId);
  if (!el) return;
  const now = new Date();
  const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
    .toISOString().slice(0, 16);
  el.value = local;
}

// ── BINANCE 실시간 가격 ──
const GECKO_IDS = ['bitcoin','ethereum','ripple','solana'];

async function fetchOneCoin(symbol, idx) {
  try {
    const res = await fetch(
      `https://api.coingecko.com/api/v3/simple/price?ids=${symbol}&vs_currencies=usd&include_24hr_change=true`,
      { headers: { 'Accept': 'application/json' } }
    );
    const data = await res.json();
    const info = data[symbol];
    if (!info) return;
    const priceEl  = document.getElementById(`tick-price-${idx}`);
    const changeEl = document.getElementById(`tick-change-${idx}`);
    if (!priceEl) return;
    const price  = info.usd;
    const change = info.usd_24h_change;
    priceEl.textContent = price.toLocaleString('en-US', {
      minimumFractionDigits: 2,
      maximumFractionDigits: price < 1 ? 4 : 2
    });
    priceEl.style.color = change >= 0 ? 'var(--green)' : 'var(--red)';
    if (changeEl) {
      changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
      changeEl.style.color = change >= 0 ? 'var(--green)' : 'var(--red)';
    }
  } catch(e) {}
}

async function fetchPrices() {
  GECKO_IDS.forEach((id, idx) => fetchOneCoin(id, idx));
}

// ── INIT ──
setNow('fEntryDate');
renderCoins();
updateHeader();
fetchPrices();
setInterval(fetchPrices, 60000);
</script>
